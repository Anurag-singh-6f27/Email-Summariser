<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
        {% endblock %}
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            min-height:100vh;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
        }

        .sidebar{

            width:250px;

            background:#1f2937;

            color:white;

            padding:25px;
        }

        .sidebar h2{

            margin-bottom:35px;

            text-align:center;
        }

        .sidebar a{

            display:block;

            color:white;

            text-decoration:none;

            padding:12px;

            margin-bottom:8px;

            border-radius:8px;

            transition:0.2s;
        }

        .sidebar a:hover{

            background:#374151;
        }

        .main-content{

            flex:1;

            padding:35px;
        }

        .cards{

            display:flex;

            gap:20px;

            flex-wrap:wrap;

            margin-top:20px;
        }

        .card{

            width:250px;

            background:white;

            border-radius:12px;

            padding:20px;

            box-shadow:0 4px 10px rgba(0,0,0,.08);
        }

        .card h3{

            margin-bottom:15px;
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h2>Email AI</h2>

        <a href="/dashboard">🏠 Dashboard</a>

        <a href="/statistics">📊 Statistics</a>

        <a href="/emails">📧 Email History</a>

        <a href="/scheduler">📅 Scheduler</a>

        <a href="/providers">🤖 AI Providers</a>

        <a href="/configuration">⚙️ Configuration</a>

        <a href="/logs">📜 Logs</a>

        <a href="/logout">🔒 Logout</a>

    </div>

    <div class="main-content">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
