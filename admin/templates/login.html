<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Administrator Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{

            background:#f4f6f9;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;
        }

        .login-card{

            width:400px;

            background:white;

            padding:40px;

            border-radius:12px;

            box-shadow:0 10px 30px rgba(0,0,0,.12);

        }

        h2{

            text-align:center;

            margin-bottom:30px;

            color:#1f2937;
        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

            color:#374151;
        }

        input{

            width:100%;

            padding:12px;

            margin-bottom:20px;

            border:1px solid #d1d5db;

            border-radius:8px;

            font-size:15px;
        }

        input:focus{

            outline:none;

            border-color:#2563eb;
        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:8px;

            background:#2563eb;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:.2s;
        }

        button:hover{

            background:#1d4ed8;
        }

        .logo{

            text-align:center;

            font-size:28px;

            font-weight:bold;

            color:#1f2937;

            margin-bottom:10px;
        }

        .subtitle{

            text-align:center;

            color:#6b7280;

            margin-bottom:30px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        📧 Email AI

    </div>

    <div class="subtitle">

        Administrator Login

    </div>

    <form
        action="/login"
        method="post"
    >

        <label>

            Username

        </label>

        <input
            type="text"
            name="username"
            required
        >

        <label>

            Password

        </label>

        <input
            type="password"
            name="password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>

</html>
